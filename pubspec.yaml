name: seforim_library_updater
description: >-
  לקוח Dart לצריכת הפצות הדלתא של Otzaria/SeforimLibrary — גילוי, תכנון מסלול,
  הורדה, אימות hash לוגי, והחלה אטומית של הפרשי DB.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  equatable: ^2.0.8
  crypto: ^3.0.7
  path: ^1.9.1
  http: ^1.6.0
  sqlite3: ^3.3.3

dev_dependencies:
  test: ^1.30.1
  lints: ^4.0.0
